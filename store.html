<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopu — Dashboard</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="app.css">
</head>
<body>

<div class="dash-shell">
  <aside class="dash-side">
    <div class="logo"><span class="dash"></span>Shopu</div>
    <nav class="dash-nav">
      <a href="dashboard.html" class="active">My shop</a>
      <a href="#" id="open-store-link" target="_blank">View my storefront</a>
    </nav>
    <button class="btn-secondary signout" id="signout-btn">Sign out</button>
  </aside>

  <main class="dash-main">
    <h1>Your shop</h1>
    <p class="dash-sub">Set up your shop details and add products customers can buy.</p>

    <div class="card" id="shop-card">
      <h2>Shop details</h2>
      <form id="shop-form">
        <div class="field">
          <label>Shop name</label>
          <input type="text" id="shop-name" placeholder="e.g. Ada's Fashion Store" required>
        </div>
        <div class="field">
          <label>WhatsApp number (with country code)</label>
          <input type="text" id="shop-whatsapp" placeholder="e.g. 2348012345678">
        </div>
        <button type="submit" class="btn-primary" id="save-shop-btn">Save shop</button>
      </form>
      <div id="shop-link-section" style="display:none;margin-top:18px;">
        <label style="display:block;font-size:13px;color:var(--muted);margin-bottom:8px;">Your shop link — share this anywhere</label>
        <div class="shop-link-box">
          <a id="shop-link" href="#" target="_blank"></a>
        </div>
      </div>
    </div>

    <div class="card" id="product-card" style="display:none;">
      <h2>Add a product</h2>
      <form id="product-form">
        <div class="field-row">
          <div class="field">
            <label>Product name</label>
            <input type="text" id="p-name" required placeholder="e.g. Ankara Gown">
          </div>
          <div class="field">
            <label>Price (₦)</label>
            <input type="number" id="p-price" required placeholder="15000">
          </div>
        </div>
        <div class="field">
          <label>Image URL (paste a link to a photo)</label>
          <input type="text" id="p-image" placeholder="https://...">
        </div>
        <div class="field">
          <label>Description</label>
          <textarea id="p-desc" rows="2" placeholder="Short description of the product"></textarea>
        </div>
        <button type="submit" class="btn-primary">Add product</button>
      </form>
    </div>

    <div class="card" id="products-list-card" style="display:none;">
      <h2>Your products</h2>
      <ul class="product-list" id="product-list"></ul>
    </div>
  </main>
</div>

<script type="module">
  import { supabase, getCurrentUser, signOut, slugify } from './auth.js';

  let user = null;
  let shop = null;

  async function init() {
    user = await getCurrentUser();
    if (!user) {
      window.location.href = 'login.html';
      return;
    }

    const { data: shops } = await supabase.from('shops').select('*').eq('owner_id', user.id).limit(1);
    if (shops && shops.length > 0) {
      shop = shops[0];
      document.getElementById('shop-name').value = shop.name;
      document.getElementById('shop-whatsapp').value = shop.whatsapp || '';
      showShopLink();
      document.getElementById('product-card').style.display = 'block';
      document.getElementById('products-list-card').style.display = 'block';
      loadProducts();
    }
  }

  function showShopLink() {
    const url = `${window.location.origin}/store.html?shop=${shop.slug}`;
    const linkEl = document.getElementById('shop-link');
    linkEl.href = url;
    linkEl.textContent = url;
    document.getElementById('shop-link-section').style.display = 'block';
    document.getElementById('open-store-link').href = url;
  }

  document.getElementById('shop-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = document.getElementById('shop-name').value.trim();
    const whatsapp = document.getElementById('shop-whatsapp').value.trim();
    const btn = document.getElementById('save-shop-btn');
    btn.disabled = true;
    btn.textContent = 'Saving...';

    if (shop) {
      const { error } = await supabase.from('shops').update({ name, whatsapp }).eq('id', shop.id);
      if (!error) { shop.name = name; shop.whatsapp = whatsapp; }
    } else {
      let slug = slugify(name);
      const { data, error } = await supabase.from('shops')
        .insert({ owner_id: user.id, name, whatsapp, slug })
        .select().single();
      if (!error) {
        shop = data;
        showShopLink();
        document.getElementById('product-card').style.display = 'block';
        document.getElementById('products-list-card').style.display = 'block';
        loadProducts();
      } else {
        alert('Error saving shop: ' + error.message);
      }
    }
    btn.disabled = false;
    btn.textContent = 'Save shop';
  });

  document.getElementById('product-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = document.getElementById('p-name').value.trim();
    const price = parseFloat(document.getElementById('p-price').value);
    const image_url = document.getElementById('p-image').value.trim();
    const description = document.getElementById('p-desc').value.trim();

    const { error } = await supabase.from('products').insert({
      shop_id: shop.id, name, price, image_url, description
    });
    if (error) {
      alert('Error adding product: ' + error.message);
    } else {
      e.target.reset();
      loadProducts();
    }
  });

  async function loadProducts() {
    const { data: products } = await supabase.from('products')
      .select('*').eq('shop_id', shop.id).order('created_at', { ascending: false });
    const list = document.getElementById('product-list');
    list.innerHTML = '';
    if (!products || products.length === 0) {
      list.innerHTML = '<li class="empty-state">No products yet. Add your first one above.</li>';
      return;
    }
    products.forEach(p => {
      const li = document.createElement('li');
      li.className = 'product-row';
      li.innerHTML = `
        <img src="${p.image_url || ''}" onerror="this.style.opacity=0">
        <div>
          <div class="pname">${p.name}</div>
          <div class="pprice">₦${Number(p.price).toLocaleString()}</div>
        </div>
        <button class="pdelete" data-id="${p.id}">Remove</button>
      `;
      list.appendChild(li);
    });
    list.querySelectorAll('.pdelete').forEach(btn => {
      btn.addEventListener('click', async () => {
        await supabase.from('products').delete().eq('id', btn.dataset.id);
        loadProducts();
      });
    });
  }

  document.getElementById('signout-btn').addEventListener('click', async () => {
    await signOut();
    window.location.href = 'login.html';
  });

  init();
</script>

</body>
</html>
